name: Android AAB

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/android-aab.yml"
      - ".github/scripts/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-aab:
    name: Build signed Android App Bundle
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      REACT_APP_BACKEND_URL: ${{ secrets.REACT_APP_BACKEND_URL || 'https://sacoparentsapp.online' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.11.1"
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Set up Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Install frontend dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Build React production bundle
        working-directory: frontend
        env:
          CI: "false"
        run: yarn build

      - name: Generate Android platform (idempotent)
        working-directory: frontend
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Inject build number into versionCode + versionName
        working-directory: frontend/android/app
        run: |
          BUILD_NUMBER=$((1000 + ${{ github.run_number }}))
          sed -i.bak "s/versionCode .*/versionCode $BUILD_NUMBER/" build.gradle
          sed -i.bak "s/versionName .*/versionName \"1.0.${{ github.run_number }}\"/" build.gradle
          echo "Using versionCode=$BUILD_NUMBER, versionName=1.0.${{ github.run_number }}"
          grep -E "versionCode|versionName" build.gradle

      - name: Decode keystore from secret
        if: env.KEYSTORE_PRESENT == 'true'
        env:
          KEYSTORE_PRESENT: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        working-directory: frontend/android/app
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > release.keystore
          echo "Keystore decoded ($(wc -c < release.keystore) bytes)"

      - name: Configure signing in build.gradle
        if: env.KEYSTORE_PRESENT == 'true'
        env:
          KEYSTORE_PRESENT: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          python3 .github/scripts/inject-signing.py
          echo "--- build.gradle after injection ---"
          cat frontend/android/app/build.gradle

      - name: Build signed AAB (release)
        if: env.KEYSTORE_PRESENT == 'true'
        env:
          KEYSTORE_PRESENT: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        working-directory: frontend/android
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Build UNSIGNED AAB (no keystore secret)
        if: env.KEYSTORE_PRESENT != 'true'
        env:
          KEYSTORE_PRESENT: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        working-directory: frontend/android
        run: |
          echo "::warning::No ANDROID_KEYSTORE_BASE64 secret set — producing UNSIGNED bundle for inspection only. Google Play will REJECT this. Add keystore secrets and re-run."
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: sa-coparents-android-aab
          path: frontend/android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 30

      - name: Upload mapping file
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sa-coparents-android-mapping
          path: frontend/android/app/build/outputs/mapping/release/mapping.txt
          if-no-files-found: ignore
          retention-days: 30

      - name: Summarise build
        if: always()
        run: |
          echo "## Build summary" >> $GITHUB_STEP_SUMMARY
          if ls frontend/android/app/build/outputs/bundle/release/*.aab >/dev/null 2>&1; then
            SIZE=$(du -h frontend/android/app/build/outputs/bundle/release/*.aab | cut -f1)
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- AAB produced (size: $SIZE)" >> $GITHUB_STEP_SUMMARY
            echo "- Download from the Artifacts section below" >> $GITHUB_STEP_SUMMARY
            echo "- Upload to Google Play Console -> Testing -> Internal testing -> Create new release" >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- AAB not produced. Check the build logs above." >> $GITHUB_STEP_SUMMARY
          fi
